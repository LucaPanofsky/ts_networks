<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ts-networks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
    #toolbar { padding: 8px 12px; background: #252526; border-bottom: 1px solid #3c3c3c; font-size: 12px; color: #858585; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #editor-pane { flex: 0 0 auto; width: min(75ch, 50%); overflow: hidden; min-width: 0; max-width: calc(100% - 48px); position: relative; }
    #resize-handle { flex: 0 0 48px; background: #3c3c3c; cursor: col-resize; transition: background 0.15s; }
    #resize-handle:hover, #resize-handle.active { background: #007acc; }
    #diagram-pane { flex: 1; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; background: #f8f8f8; background-image: radial-gradient(circle, #c0c0c0 1px, transparent 1px); background-size: 20px 20px; cursor: grab; }
    #diagram-pane.panning { cursor: grabbing; }
    #diagram { height: -webkit-fill-available; width: 100%; align-items: center; justify-content: center; display: flex; transform-origin: center center; }

    #diagram-controls {
      position: absolute;
      top: 12px;
      left: 24px;
      right: 24px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      font-size: 12px;
      color: #333;
      pointer-events: all;
    }
    #diagram-controls select { flex: 1; }
    #diagram-controls select, #diagram-controls button {
      font-family: monospace;
      font-size: 12px;
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 2px 6px;
      cursor: pointer;
      color: #333;
    }
    #diagram-controls select:focus, #diagram-controls button:hover {
      outline: none;
      border-color: #007acc;
    }

    #status { padding: 4px 12px; background: #007acc; font-size: 11px; }

    #terminal-pane {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      background: #1e1e1e;
      z-index: 5;
    }
    #terminal-pane.active { display: flex; }

    #terminal-output {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #d4d4d4;
    }
    #terminal-output .line-input { color: #569cd6; }
    #terminal-output .line-ok    { color: #4ec9b0; }
    #terminal-output .line-err   { color: #f48771; }
    #terminal-output .line-log   { color: #858585; }

    #terminal-input-wrap {
      border-top: 1px solid #3c3c3c;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #terminal-input {
      width: 100%;
      background: #252526;
      color: #d4d4d4;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: 12px;
      resize: none;
      outline: none;
      min-height: 80px;
    }
    #terminal-input:focus { border-color: #007acc; }
    #terminal-hint { font-size: 11px; color: #555; }

    #pane-toggle {
      position: absolute;
      bottom: 10px;
      right: 10px;
      z-index: 20;
      font-family: monospace;
      font-size: 11px;
      background: #252526;
      color: #858585;
      border: 1px solid #3c3c3c;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
    }
    #pane-toggle:hover { color: #d4d4d4; border-color: #007acc; }

    #detail-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 20px 24px;
      background: #252526;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 13px;
      min-width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #detail-dialog::backdrop { background: rgba(0,0,0,0.3); }
    #detail-dialog header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    #detail-dialog header span { font-size: 11px; color: #858585; text-transform: uppercase; letter-spacing: 0.05em; }
    #detail-dialog button { background: none; border: none; color: #858585; cursor: pointer; font-size: 16px; line-height: 1; }
    #detail-dialog button:hover { color: #d4d4d4; }
    #detail-body { line-height: 1.8; }
    #detail-body strong { color: #9cdcfe; }
  </style>
</head>
<body>
  <div id="toolbar">ts-networks · SSE dev view</div>
  <div id="main">
    <div id="editor-pane">
      <div id="terminal-pane">
        <div id="terminal-output"></div>
        <div id="terminal-input-wrap">
          <textarea id="terminal-input" placeholder="run networkName with&#10;  cell a = 42;&#10;end" spellcheck="false"></textarea>
          <span id="terminal-hint">Shift+Enter to evaluate</span>
        </div>
      </div>
      <button id="pane-toggle">repl</button>
    </div>
    <div id="resize-handle"></div>
    <div id="diagram-pane">
      <div id="diagram-controls">
        <select id="network-select"><option value="">— no program —</option></select>
        <button id="rotate-btn">⟳ rotate</button>
      </div>
      <div id="diagram"></div>
    </div>
  </div>
  <div id="status">waiting for program…</div>

  <dialog id="detail-dialog">
    <header>
      <span>node detail</span>
      <button id="detail-close">✕</button>
    </header>
    <div id="detail-body"></div>
  </dialog>

  <script src="/editor.bundle.js"></script>
  <script>
    // ── pane toggle (editor ↔ terminal) ──────────────────────────────────────
    const terminalPane = document.getElementById("terminal-pane");
    const terminalOutput = document.getElementById("terminal-output");
    const terminalInput = document.getElementById("terminal-input");
    const paneToggle = document.getElementById("pane-toggle");
    let replMode = false;

    paneToggle.addEventListener("click", () => {
      replMode = !replMode;
      terminalPane.classList.toggle("active", replMode);
      paneToggle.textContent = replMode ? "editor" : "repl";
      if (replMode) terminalInput.focus();
    });

    function termAppend(text, cls) {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = text;
      terminalOutput.appendChild(line);
      terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    terminalInput.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter" || !e.shiftKey) return;
      e.preventDefault();
      const cmd = terminalInput.value.trim();
      if (!cmd) return;
      termAppend(cmd.split("\n").map(l => "> " + l).join("\n"), "line-input");
      terminalInput.value = "";
      // TODO: parse cmd and POST to /run
      termAppend("(evaluation not yet wired)", "line-log");
    });

    // ── SSE log lines ─────────────────────────────────────────────────────────
    // handled below in the SSE block — type "log" appends to terminal

    // ── resize handle ─────────────────────────────────────────────────────────
    const handle = document.getElementById("resize-handle");
    const editorPane = document.getElementById("editor-pane");
    let resizing = false;

    handle.addEventListener("mousedown", () => {
      resizing = true;
      handle.classList.add("active");
      document.body.style.userSelect = "none";
      document.body.style.cursor = "col-resize";
    });

    window.addEventListener("mousemove", (e) => {
      if (!resizing) return;
      const mainRect = document.getElementById("main").getBoundingClientRect();
      const newWidth = Math.min(Math.max(e.clientX - mainRect.left, 0), mainRect.width - 48);
      editorPane.style.width = `${newWidth}px`;
    });

    window.addEventListener("mouseup", () => {
      if (!resizing) return;
      resizing = false;
      handle.classList.remove("active");
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    });

    // ── zoom + pan ────────────────────────────────────────────────────────────
    const pane = document.getElementById("diagram-pane");
    const diagram = document.getElementById("diagram");
    const controls = document.getElementById("diagram-controls");

    let scale = 1, tx = 0, ty = 0;
    let dragging = false, startX = 0, startY = 0;

    function applyTransform() {
      diagram.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    }

    function resetTransform() {
      scale = 1; tx = 0; ty = 0;
      applyTransform();
    }

    pane.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(Math.max(scale * delta, 0.1), 10);
      applyTransform();
    }, { passive: false });

    pane.addEventListener("mousedown", (e) => {
      if (controls.contains(e.target)) return;
      dragging = true;
      startX = e.clientX - tx;
      startY = e.clientY - ty;
      pane.classList.add("panning");
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      tx = e.clientX - startX;
      ty = e.clientY - startY;
      applyTransform();
    });

    window.addEventListener("mouseup", () => {
      dragging = false;
      pane.classList.remove("panning");
    });

    // ── detail dialog ─────────────────────────────────────────────────────────
    const detailDialog = document.getElementById("detail-dialog");
    const detailBody = document.getElementById("detail-body");
    document.getElementById("detail-close").addEventListener("click", () => {
      detailDialog.close();
      detailBody.innerHTML = "";
    });

    let currentDetails = {};

    window.openDetail = (nodeId) => {
      const html = currentDetails[nodeId];
      if (!html) return;
      detailBody.innerHTML = html;
      detailDialog.showModal();
    };

    // ── network select + rotate ───────────────────────────────────────────────
    const networkSelect = document.getElementById("network-select");
    const rotateBtn = document.getElementById("rotate-btn");
    let currentNetworks = [];
    const DIRECTIONS = ["LR", "TB", "RL", "BT"];
    let dirIndex = 0;

    function applyDirection(diagram) {
      return diagram.replace(/^flowchart-elk \w+/, `flowchart-elk ${DIRECTIONS[dirIndex]}`);
    }

    async function renderNetwork(net) {
      currentDetails = net.details ?? {};
      diagram.innerHTML = "";
      resetTransform();
      if (net.diagram) await window.tsnetEditor.renderDiagram(applyDirection(net.diagram));
    }

    networkSelect.addEventListener("change", () => {
      const net = currentNetworks[networkSelect.selectedIndex];
      if (net) renderNetwork(net);
    });

    rotateBtn.addEventListener("click", () => {
      dirIndex = (dirIndex + 1) % DIRECTIONS.length;
      const net = currentNetworks[networkSelect.selectedIndex];
      if (net) renderNetwork(net);
    });

    // ── SSE ───────────────────────────────────────────────────────────────────
    const es = new EventSource("/events");
    es.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "log") {
        termAppend(msg.payload.line, msg.payload.error ? "line-err" : "line-log");
        return;
      }
      if (msg.type === "program") {
        const { source, networks } = msg.payload;
        currentNetworks = networks ?? [];
        dirIndex = 0;

        // repopulate select
        networkSelect.innerHTML = currentNetworks.length === 0
          ? `<option value="">— no networks —</option>`
          : currentNetworks.map((n, i) => `<option value="${i}">${n.name}</option>`).join("");

        if (source) window.tsnetEditor.setValue(source);

        // auto-select and render the last network
        const last = currentNetworks[currentNetworks.length - 1];
        if (last) {
          networkSelect.selectedIndex = currentNetworks.length - 1;
          await renderNetwork(last);
        } else {
          diagram.innerHTML = "";
          resetTransform();
        }

        document.getElementById("status").textContent = "program received";
      }
    };
    es.onerror = () => {
      document.getElementById("status").textContent = "connection lost — reload to reconnect";
    };
  </script>
</body>
</html>
