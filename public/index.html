<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ts-networks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
    #toolbar { padding: 8px 12px; background: #252526; border-bottom: 1px solid #3c3c3c; font-size: 12px; color: #858585; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #editor-pane { flex: 0 0 auto; width: min(75ch, 50%); overflow: hidden; min-width: 60ch; max-width: calc(100% - 48px); }
    #resize-handle { flex: 0 0 48px; background: #3c3c3c; cursor: col-resize; transition: background 0.15s; }
    #resize-handle:hover, #resize-handle.active { background: #007acc; }
    #diagram-pane { flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8f8f8; background-image: radial-gradient(circle, #c0c0c0 1px, transparent 1px); background-size: 20px 20px; cursor: grab; }
    #diagram-pane.panning { cursor: grabbing; }
    #diagram { height: -webkit-fill-available; width: 100%; align-items: center; justify-content: center; display: flex; transform-origin: center center; }
    #status { padding: 4px 12px; background: #007acc; font-size: 11px; }

    #detail-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid #3c3c3c;
      border-radius: 6px;
      padding: 20px 24px;
      background: #252526;
      color: #d4d4d4;
      font-family: monospace;
      font-size: 13px;
      min-width: 260px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #detail-dialog::backdrop { background: rgba(0,0,0,0.3); }
    #detail-dialog header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    #detail-dialog header span { font-size: 11px; color: #858585; text-transform: uppercase; letter-spacing: 0.05em; }
    #detail-dialog button { background: none; border: none; color: #858585; cursor: pointer; font-size: 16px; line-height: 1; }
    #detail-dialog button:hover { color: #d4d4d4; }
    #detail-body { line-height: 1.8; }
    #detail-body strong { color: #9cdcfe; }
  </style>
</head>
<body>
  <div id="toolbar">ts-networks · SSE dev view</div>
  <div id="main">
    <div id="editor-pane"></div>
    <div id="resize-handle"></div>
    <div id="diagram-pane"><div id="diagram"></div></div>
  </div>
  <div id="status">waiting for program…</div>

  <dialog id="detail-dialog">
    <header>
      <span>node detail</span>
      <button id="detail-close">✕</button>
    </header>
    <div id="detail-body"></div>
  </dialog>

  <script src="/editor.bundle.js"></script>
  <script>
    // ── resize handle ─────────────────────────────────────────────────────────
    const handle = document.getElementById("resize-handle");
    const editorPane = document.getElementById("editor-pane");
    let resizing = false;

    handle.addEventListener("mousedown", (e) => {
      resizing = true;
      handle.classList.add("active");
      document.body.style.userSelect = "none";
      document.body.style.cursor = "col-resize";
    });

    window.addEventListener("mousemove", (e) => {
      if (!resizing) return;
      const mainRect = document.getElementById("main").getBoundingClientRect();
      const minWidth = parseFloat(getComputedStyle(editorPane).minWidth);
      const newWidth = Math.min(Math.max(e.clientX - mainRect.left, minWidth), mainRect.width - 48);
      editorPane.style.width = `${newWidth}px`;
    });

    window.addEventListener("mouseup", () => {
      if (!resizing) return;
      resizing = false;
      handle.classList.remove("active");
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    });

    // ── zoom + pan ────────────────────────────────────────────────────────────
    const pane = document.getElementById("diagram-pane");
    const diagram = document.getElementById("diagram");

    let scale = 1, tx = 0, ty = 0;
    let dragging = false, startX = 0, startY = 0;

    function applyTransform() {
      diagram.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    }

    function resetTransform() {
      scale = 1; tx = 0; ty = 0;
      applyTransform();
    }

    pane.addEventListener("wheel", (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(Math.max(scale * delta, 0.1), 10);
      applyTransform();
    }, { passive: false });

    pane.addEventListener("mousedown", (e) => {
      dragging = true;
      startX = e.clientX - tx;
      startY = e.clientY - ty;
      pane.classList.add("panning");
    });

    window.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      tx = e.clientX - startX;
      ty = e.clientY - startY;
      applyTransform();
    });

    window.addEventListener("mouseup", () => {
      dragging = false;
      pane.classList.remove("panning");
    });

    // ── detail dialog ─────────────────────────────────────────────────────────
    const detailDialog = document.getElementById("detail-dialog");
    const detailBody = document.getElementById("detail-body");
    document.getElementById("detail-close").addEventListener("click", () => {
      detailDialog.close();
      detailBody.innerHTML = "";
    });

    let currentDetails = {};

    window.openDetail = (nodeId) => {
      const html = currentDetails[nodeId];
      if (!html) return;
      detailBody.innerHTML = html;
      detailDialog.showModal();
    };

    // ── SSE ───────────────────────────────────────────────────────────────────
    const es = new EventSource("/events");
    es.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "program") {
        const { source, diagram: chart, details } = msg.payload;
        currentDetails = details ?? {};
        diagram.innerHTML = "";
        resetTransform();
        if (source) window.tsnetEditor.setValue(source);
        if (chart) await window.tsnetEditor.renderDiagram(chart);
        document.getElementById("status").textContent = "program received";
      }
    };
    es.onerror = () => {
      document.getElementById("status").textContent = "connection lost — reload to reconnect";
    };
  </script>
</body>
</html>
